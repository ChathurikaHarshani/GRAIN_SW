{% extends "base.html" %}

{% block title %}Billing | GMS{% endblock %}

{% block content %}
<div class="container py-4">

  <h1 class="mb-4 text-white">Add Storage Location</h1>
  <a href="{{ url_for('list_storage') }}" class="btn btn-link">&larr; Back to Storage</a>

  {% if error %}
    <div class="alert alert-danger mt-3">{{ error }}</div>
  {% endif %}

  <form method="post" class="mt-3">
    <div class="row">
      <div class="col-md-4 mb-3">
        <label class="form-label text-white">Bin Code *</label>
        <input type="text" class="form-control" name="bin_code" required>
      </div>
      <div class="col-md-5 mb-3">
        <label class="form-label text-white">Bin Name *</label>
        <input type="text" class="form-control" name="bin_name" required>
      </div>
      <div class="col-md-3 mb-3">
        <label class="form-label text-white">Capacity (bu) *</label>
        <input type="number" step="0.01" class="form-control" name="bin_capacity" required>
      </div>
    </div>

    <div class="row">
      <div class="col-md-3 mb-3">
        <label class="form-label text-white">Diameter (ft)</label>
        <input type="number" step="0.01" class="form-control" name="diameter">
      </div>
      <div class="col-md-4 mb-3">
        <label class="form-label text-white">Install Date</label>
        <input type="datetime-local" class="form-control" name="install_date">
      </div>
      <div class="col-md-5 mb-3">
        <label class="form-label text-white">Manufacturer</label>
        <input type="text" class="form-control" name="manufacture">
      </div>
    </div>

    <div class="row">
      <div class="col-md-3 mb-3">
        <label class="form-label  text-white">Latitude</label>
        <input type="number" step="0.0000001" class="form-control" name="lattitude">
      </div>
      <div class="col-md-3 mb-3">
        <label class="form-label text-white">Longitude</label>
        <input type="number" step="0.0000001" class="form-control" name="lontitude">
      </div>
      <div class="col-md-6 mb-3">
        <label class="form-label text-white">Legal Description</label>
        <input type="text" class="form-control" name="legal_desc">
      </div>
    </div>

    <button type="submit" class="btn btn-primary">Save</button>
  </form>

</div>
{% endblock %}
