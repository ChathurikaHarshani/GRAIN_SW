{% extends "base.html" %}

{% block title %}Billing | GMS{% endblock %}

{% block content %}
<div class="container py-4">
  <h1 class="mb-4 text-white">Add Field</h1>
  <a href="{{ url_for('list_fields') }}" class="btn btn-link">&larr; Back to Fields</a>

  {% if error %}<div class="alert alert-danger mt-3">{{ error }}</div>{% endif %}

  <form method="post" class="mt-3">
    <div class="mb-3">
      <label class="form-label text-white">Field Name</label>
      <input type="text" class="form-control" name="field_name" required>
    </div>

    <div class="mb-3">
      <label class="form-label text-white">Department</label>
      <select class="form-select" name="dpt_id" required>
        <option value="">-- Select Department --</option>
        {% for d in departments %}
          <option value="{{ d.Dpt_ID }}">{{ d.Dpt_Name }}</option>
        {% endfor %}
      </select>
    </div>

    <div class="row">
      <div class="col-md-4 mb-3">
        <label class="form-label text-white">Crop Year</label>
        <input type="number" class="form-control" name="crop_year" min="1900" max="2100" required>
      </div>
      <div class="col-md-4 mb-3">
        <label class="form-label text-white">Acres</label>
        <input type="number" step="0.01" class="form-control" name="acres">
      </div>
      <div class="col-md-4 mb-3">
        <label class="form-label text-white">Irr Type</label>
        <input type="text" class="form-control" name="irr_type" placeholder="Irrigated/Dryland">
      </div>
    </div>

    <div class="mb-3">
      <label class="form-label text-white">Hybrid Variety</label>
      <input type="text" class="form-control" name="hybrid_variety">
    </div>

    <div class="mb-3">
      <label class="form-label text-white">Note</label>
      <textarea class="form-control" name="note" rows="3"></textarea>
    </div>

    <button type="submit" class="btn btn-primary">Save</button>
  </form>
</div>
{% endblock %}
