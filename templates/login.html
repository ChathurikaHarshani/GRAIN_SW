<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Login | GMS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    :root{
      --glass: rgba(255,255,255,0.22);
      --glass-strong: rgba(255,255,255,0.35);
      --border: rgba(255,255,255,0.45);
      --shadow: 0 40px 90px rgba(0,0,0,0.18);
      --green: #2f7d32;
    }

    /* ===== Background (same look as landing) ===== */
    body{
      margin:0;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      font-family: system-ui, -apple-system, sans-serif;

      /* Recommended: use a soft background image like landing_bg.jpg */
      background: url("{{ url_for('static', filename='images/landing.jpeg') }}") center/cover no-repeat fixed;
      position: relative;
      padding: 28px;
    }

    /* Blur overlay */
    body::before{
      content:"";
      position: fixed;
      inset:0;
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      z-index:-2;
    }

    /* Soft color wash */
    body::after{
      content:"";
      position: fixed;
      inset:0;
      background:
        radial-gradient(circle at 25% 20%, rgba(120,170,255,0.22), transparent 40%),
        radial-gradient(circle at 80% 70%, rgba(170,255,150,0.20), transparent 45%),
        radial-gradient(circle at 70% 30%, rgba(255,240,160,0.18), transparent 50%);
      z-index:-1;
      pointer-events:none;
    }

    /* Outer shell */
    .auth-shell{
      width: min(980px, 94%);
      border-radius: 34px;
      overflow: hidden;
      background: var(--glass);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      backdrop-filter: blur(22px);
      -webkit-backdrop-filter: blur(22px);
      position: relative;
    }

    .auth-shell::before{
      content:"";
      position:absolute;
      inset: 10px;
      border-radius: 28px;
      border: 1px solid rgba(255,255,255,0.25);
      pointer-events:none;
    }

    /* Inner card */
    .inner-card{
      margin: 26px;
      border-radius: 28px;
      overflow:hidden;
      background: rgba(255,255,255,0.22);
      border: 1px solid rgba(255,255,255,0.35);
      backdrop-filter: blur(22px);
      -webkit-backdrop-filter: blur(22px);
      box-shadow: 0 20px 45px rgba(0,0,0,0.10);
    }

    /* Left image block */
    .left-photo{
      min-height: 520px;
      background: url("{{ url_for('static', filename='images/landing.jpeg') }}") center/cover no-repeat;
    }

    /* Right panel form */
    .panel{
      min-height: 520px;
      padding: 62px 56px;
      background: rgba(255,255,255,0.10);
      border-left: 1px solid rgba(255,255,255,0.25);
    }

    h1{
      font-weight: 800;
      letter-spacing: -0.6px;
      font-size: 2.2rem;
      line-height: 1.2;
      color: rgba(0,0,0,0.78);
      margin-bottom: 8px;
    }

    .subtitle{
      color: rgba(0,0,0,0.55);
      margin-bottom: 26px;
    }

    /* Inputs */
    .form-control{
      border-radius: 12px;
      border: 1px solid rgba(0,0,0,0.12);
      background: rgba(255,255,255,0.70);
      padding: 12px 14px;
    }
    .form-control:focus{
      box-shadow: 0 0 0 4px rgba(47,125,50,0.15);
      border-color: rgba(47,125,50,0.45);
    }

    /* Buttons */
    .btn-primary{
      background: var(--green);
      border: none;
      padding: 12px 18px;
      font-weight: 600;
      border-radius: 12px;
      box-shadow: 0 10px 20px rgba(47,125,50,0.22);
    }
    .btn-primary:hover{ background:#256628; }

    .btn-outline-dark{
      border-radius: 12px;
      padding: 12px 18px;
      border-color: rgba(0,0,0,0.22);
      background: rgba(255,255,255,0.20);
      color: rgba(0,0,0,0.72);
    }
    .btn-outline-dark:hover{
      background: rgba(255,255,255,0.28);
      border-color: rgba(0,0,0,0.30);
      color: rgba(0,0,0,0.85);
    }

    hr{
      opacity: 0.16;
      margin: 22px 0;
    }

    /* Error alert style */
    .alert{
      border-radius: 14px;
      border: 1px solid rgba(220,53,69,0.25);
      background: rgba(220,53,69,0.10);
      color: rgba(120,0,10,0.95);
    }

    @media (max-width: 992px){
      body{ padding: 16px; }
      .inner-card{ margin: 16px; }
      .left-photo{ min-height: 260px; }
      .panel{ min-height: auto; padding: 34px 26px; }
      h1{ font-size: 1.9rem; }
    }
  </style>
</head>

<body>

  <div class="auth-shell">
    <div class="inner-card">
      <div class="row g-0">

        <!-- LEFT IMAGE -->
        <div class="col-lg-5">
          <div class="left-photo"></div>
        </div>

        <!-- RIGHT FORM -->
        <div class="col-lg-7">
          <div class="panel">

            <h1>GMS Login</h1>
            <p class="subtitle">Sign in to access your farm operations dashboard.</p>

            {% if error %}
              <div class="alert alert-danger mb-3">{{ error }}</div>
            {% endif %}

            <form method="post" class="mb-3">
              <div class="mb-3">
                <label class="form-label fw-semibold">Username</label>
                <input name="username" class="form-control" placeholder="Enter username" required>
              </div>

              <div class="mb-3">
                <label class="form-label fw-semibold">Password</label>
                <input name="password" type="password" class="form-control" placeholder="Enter password" required>
              </div>

              <div class="d-grid gap-2">
                <button class="btn btn-primary" type="submit">Sign In</button>
                <a href="{{ url_for('landing') }}" class="btn btn-outline-dark">
                  ← Back to main page
                </a>
              </div>
            </form>

            <hr>

            <div class="text-muted small">
              Need an account?
              <a href="{{ url_for('signup') }}" class="text-decoration-none fw-semibold">Create one</a>
            </div>

          </div>
        </div>

      </div>
    </div>
  </div>

</body>
</html>
