{% extends "base.html" %}

{% block title %}Billing | GMS{% endblock %}

{% block content %}

<div class="container py-4">
  <h1 class="mb-4 text-white">Add Crop</h1>
  <a href="{{ url_for('list_crops') }}" class="btn btn-link">&larr; Back to Crops</a>

  {% if error %}<div class="alert alert-danger mt-3">{{ error }}</div>{% endif %}

  <form method="post" class="mt-3">
    <div class="row">
      <div class="col-md-3 mb-3">
        <label class="form-label text-white">Crop Code</label>
        <input type="text" class="form-control" name="crop_code" required>
      </div>
      <div class="col-md-5 mb-3">
        <label class="form-label text-white">Crop Name</label>
        <input type="text" class="form-control" name="crop_name" required>
      </div>
      <div class="col-md-2 mb-3">
        <label class="form-label text-white">Wt/bu</label>
        <input type="number" step="0.01" class="form-control" name="weight_per_bushel" required>
      </div>
      <div class="col-md-2 mb-3">
        <label class="form-label text-white">Base MC</label>
        <input type="number" step="0.01" class="form-control" name="base_mc" required>
      </div>
    </div>

    <button type="submit" class="btn btn-primary">Save</button>
  </form>
</div>

{% endblock %}
